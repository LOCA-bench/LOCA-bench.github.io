<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LOCA-bench{% endblock %}</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    <script>
      // Initialize theme immediately to prevent flash
      (function() {
        const storedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (storedTheme === 'dark' || (!storedTheme && prefersDark)) {
          document.documentElement.classList.add('dark-mode');
        }
      })();
    </script>
    {% block head_extra %}{% endblock %}
</head>
<body>
    {% include "_sidebar.html" %}

    <div class="main-content">
        {% block content %}
        {% endblock %}

        <footer class="footer">
            <div class="container">
                <div class="footer-content">
                    <div class="footer-copyright">
                        &copy; 2025 LOCA-bench Team. All rights reserved.
                    </div>
                    <div class="footer-links">
                        <a href="https://github.com/hkust-nlp/LOCA-bench" target="_blank">GitHub</a>
                        <a href="https://arxiv.org/abs/2602.07962" target="_blank">Paper</a>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script src="js/mainResults.js"></script>
    {% block js_files %}
    {% endblock %}

    <script>
        function initTheme() {
            const themeToggle = document.getElementById('theme-toggle');
            const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)');

            if (document.documentElement.classList.contains('dark-mode')) {
                document.body.classList.add('dark-mode');
                document.documentElement.classList.remove('dark-mode');
            }

            if (themeToggle) {
                themeToggle.addEventListener('click', () => {
                    document.body.classList.toggle('dark-mode');
                    const isDarkMode = document.body.classList.contains('dark-mode');
                    localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
                });
            }

            prefersDarkScheme.addEventListener('change', (e) => {
                if (!localStorage.getItem('theme')) {
                    if (e.matches) {
                        document.body.classList.add('dark-mode');
                    } else {
                        document.body.classList.remove('dark-mode');
                    }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            initTheme();

            const currentPath = window.location.pathname;
            const currentPage = currentPath.split('/').pop().split('.')[0] || 'index';

            const navLinks = document.querySelectorAll('.nav-link');
            navLinks.forEach(link => {
                const linkPage = link.getAttribute('data-page');
                if (linkPage === currentPage) {
                    link.classList.add('active');
                }
            });

            const sidebarOpener = document.querySelector('.sidebar-opener');
            const sidebarCloser = document.querySelector('.sidebar .mobile-nav-toggle');
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.querySelector('.sidebar-overlay');

            if ((sidebarOpener || sidebarCloser) && sidebar && overlay) {
                function openMenu() {
                    sidebar.classList.add('open');
                    overlay.classList.add('active');
                }

                function closeMenu() {
                    sidebar.classList.remove('open');
                    overlay.classList.remove('active');
                }

                if (sidebarOpener) {
                    sidebarOpener.addEventListener('click', function(e) {
                        e.preventDefault();
                        openMenu();
                    });
                }

                if (sidebarCloser) {
                    sidebarCloser.addEventListener('click', function(e) {
                        e.preventDefault();
                        closeMenu();
                    });
                }

                overlay.addEventListener('click', function(e) {
                    e.preventDefault();
                    closeMenu();
                });

                navLinks.forEach(link => {
                    link.addEventListener('click', () => {
                        if (sidebar.classList.contains('open')) {
                            closeMenu();
                        }
                    });
                });

                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape' && sidebar.classList.contains('open')) {
                        closeMenu();
                    }
                });
            }
        });
    </script>

    {% block scripts_extra %}
    {% endblock %}
</body>
</html>
